components:
  schemas:
    AssignedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        avatar:
          type: string
          format: uri
          readOnly: true
        role:
          type: string
          readOnly: true
      required:
      - avatar
      - id
      - role
      - username
    BlankEnum:
      enum:
      - ''
    CalendarEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        event_type:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EventTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        priority:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        event_date:
          type: string
          format: date
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - title
    Comment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        task:
          type: integer
          readOnly: true
        author:
          allOf:
          - $ref: '#/components/schemas/AssignedUser'
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - content
      - created_at
      - id
      - task
    EventTypeEnum:
      enum:
      - MEETING
      - TASK
      - DEADLINE
      - REMINDER
      type: string
      description: |-
        * `MEETING` - Meeting
        * `TASK` - Task
