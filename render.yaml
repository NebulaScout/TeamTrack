services:
  - type: web
    name: teamtrack-api
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: teamtrack-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: teamtrack-db
          property: connectionString

databases:
  - name: teamtrack-db
    plan: free
