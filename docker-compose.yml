# version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: teamtrack_db
      POSTGRES_USER: teamtrack_user
      POSTGRES_PASSWORD: teamtrack_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamtrack_user -d teamtrack_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/static

volumes:
  postgres_data:
  media_data:
  static_data:   